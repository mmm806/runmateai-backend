spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/runmateai
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

jwt:
  secret: runmateai-secret-key-please-change-this-in-production-must-be-long
  access-expiration: 1800000      # 30? (ms)
  refresh-expiration: 1209600000  # 2? (ms)

logging:
  level:
    com.runmateai: DEBUG
    org.hibernate.SQL: DEBUG