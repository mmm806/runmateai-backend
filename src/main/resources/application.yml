spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/runmateai}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres456}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  access-expiration: ${JWT_ACCESS_EXPIRATION:1800000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:1209600000}

logging:
  level:
    com.runmateai: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: ${HIBERNATE_LOG_LEVEL:WARN}

claude:
  api:
    key: ${CLAUDE_API_KEY}
    url: https://api.anthropic.com/v1/messages
    model: claude-sonnet-4-6

cors:
  # 배포 시 AWS CloudFront URL 또는 커스텀 도메인을 쉼표로 추가
  # 예: http://localhost:5173,http://localhost:5174,https://xxxx.cloudfront.net
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs