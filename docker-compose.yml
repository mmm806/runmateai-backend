# docker-compose.yml (로컬 개발용)
version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: runmateai-db
    environment:
      POSTGRES_DB: runmateai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres456
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: