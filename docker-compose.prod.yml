# docker-compose.prod.yml (EC2 배포용)
# 사용법: docker-compose -f docker-compose.prod.yml up -d
#
# 필요한 환경변수 (.env 파일 또는 EC2 환경변수로 주입):
#   DB_URL, DB_USERNAME, DB_PASSWORD
#   JWT_SECRET, CLAUDE_API_KEY
#   CORS_ALLOWED_ORIGINS

version: '3.8'

services:
  app:
    image: runmateai-backend:latest   # 로컬 빌드 또는 ECR에서 pull
    container_name: runmateai-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      # RDS 연결 정보 (EC2 환경변수에서 주입)
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      # 배포 환경에서는 ddl-auto를 update 유지 (최초 배포 시 테이블 자동 생성)
      DDL_AUTO: update
      SHOW_SQL: "false"
      # JWT / Claude API
      JWT_SECRET: ${JWT_SECRET}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      # CORS: CloudFront URL 또는 커스텀 도메인 추가
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    networks:
      - runmateai-network

  nginx:
    image: nginx:alpine
    container_name: runmateai-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - runmateai-network

networks:
  runmateai-network:
    driver: bridge