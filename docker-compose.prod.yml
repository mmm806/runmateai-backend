# docker-compose.prod.yml (EC2 배포용)
# 사용법: docker-compose -f docker-compose.prod.yml up -d
#
# 필요한 환경변수 (.env 파일로 주입):
#   DB_PASSWORD, JWT_SECRET, CLAUDE_API_KEY, CORS_ALLOWED_ORIGINS

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: runmateai-db
    restart: always
    environment:
      POSTGRES_DB: runmateai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - runmateai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: runmateai-backend:latest
    container_name: runmateai-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/runmateai
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      DDL_AUTO: update
      SHOW_SQL: "false"
      JWT_SECRET: ${JWT_SECRET}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - runmateai-network

  nginx:
    image: nginx:alpine
    container_name: runmateai-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - runmateai-network

networks:
  runmateai-network:
    driver: bridge

volumes:
  postgres_data: